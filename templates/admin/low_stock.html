{% extends "admin/base.html" %}
{% block title %}Low Stock Alerts{% endblock %}

{% block content %}

<div class="container-fluid py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">Low Stock Alerts</h3>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>School</th>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Current Stock</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="lowStockTable"></tbody>
            </table>

        </div>
    </div>
</div>

<script>
fetch('/api/admin/alerts/low-stock', {
    headers: { "Authorization": "Bearer " + localStorage.getItem("access_token") }
})
.then(res => res.json())
.then(data => {

    const tbody = document.getElementById("lowStockTable");

    if(data.alerts.length === 0){
        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center text-muted">
                    No low stock alerts
                </td>
            </tr>
        `;
        return;
    }

    data.alerts.forEach(item => {
        tbody.innerHTML += `
            <tr>
                <td>${item.school.name}</td>
                <td>${item.product.name}</td>
                <td>${item.category}</td>
                <td class="fw-bold text-danger">${item.current_stock}</td>
                <td>
                    <span class="badge bg-danger">Reorder Required</span>
                </td>
            </tr>
        `;
    });

});
</script>

{% endblock %}
