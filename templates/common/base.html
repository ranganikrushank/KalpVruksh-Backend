<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory ERP System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        .sidebar {
            min-height: 100vh;
            background: #2c3e50;
            color: #ecf0f1;
            padding-top: 1rem;
        }
        .sidebar .nav-link {
            color: #bdc3c7;
            border-left: 4px solid transparent;
            padding: 0.75rem 1.25rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background: #34495e;
            color: #fff;
            border-left-color: #3498db;
        }
        .main-content {
            padding: 1.5rem;
        }
        .card-header i {
            margin-right: 0.5rem;
        }
        .status-badge {
            font-size: 0.85rem;
            padding: 0.25rem 0.5rem;
        }
        .status-pending { background: #ffcc00; color: #333; }
        .status-sent { background: #3498db; color: white; }
        .status-completed { background: #27ae60; color: white; }
        .status-on-the-way { background: #f39c12; color: white; }
        .status-delivered { background: #2ecc71; color: white; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-inbox me-2"></i>
                <span>ERP Inventory System</span>
            </a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">Hi, {{ current_user.username }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                {% block sidebar %}{% endblock %}
            </div>

            <!-- Main Content -->
            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
