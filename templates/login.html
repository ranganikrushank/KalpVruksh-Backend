<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP Inventory System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); }
        .login-card { max-width: 400px; margin: 60px auto; }
        .login-card .card-header {
            background: #fff;
            border-bottom: none;
            text-align: center;
        }
        .login-card .card-body { background: #fff; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="card shadow">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-inbox"></i> ERP Inventory System</h4>
                <p class="text-muted mb-0">Sign in to continue</p>
            </div>
            <div class="card-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-lock"></i> Sign In
                    </button>
                </form>

                <div class="mt-4 text-center">
                    <small class="text-muted">Demo: admin / admin123</small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
